<mat-card appearance="outlined">
  <mat-card-content>
    <div class="card-header">
      <div class="h2">In Game Time</div>
    </div>
    @if (!loading) {
      <div class="chart-container">
        @if (events?.length > 0) {
          <lib-bar-chart [events]="events" convertTo="Hours"></lib-bar-chart>
        } @else {
          <div class="loading-container">

          <lib-skeleton-chart-loader></lib-skeleton-chart-loader>
          <h3 class="text-center">Loading First Time Data</h3>
        </div>
      }
    </div>
  } @else {
    <div class="loading-container">

    <lib-skeleton-chart-loader></lib-skeleton-chart-loader>
  </div>
}
@if (updating && events?.length > 0) {
  <div class="update-info">Updating...</div>
}
@if (updating && events?.length === 0) {
  <div class="chart-container">
    <div class="text-center">
      <div class="h3">Loading Initial Data...</div>
      <div class="h6">This may take a while....</div>
    </div>
  </div>
}
</mat-card-content>
</mat-card>
