<mat-card class="clan-member-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title-group>
      <mat-card-title>{{ cardTitle }}</mat-card-title>
    </mat-card-title-group>
  </mat-card-header>
  <mat-card-content class="clan-member-card__card-content slim-scroll">
    @if (!isLoading) {
      <mat-list>
        @for (member of members; track member; let idx = $index) {
          <mat-list-item>
            <div class="member-info">
              <div class="member-name">
                <button mat-button (click)="viewProfile.emit(member.profile)"> {{ member.profile | bungieDisplayName }}</button>
                @if (member.member.isOnline) {
                  <span class="online" matTooltip="Online / In Orbit"></span
                    >
                  }
                </div>
                <ng-container [ngTemplateOutlet]="itemTemplate" [ngTemplateOutletContext]="{ $implicit: member }">
                </ng-container>
              </div>
            </mat-list-item>
          }
        </mat-list>
      } @else {
        <mat-list>
          @for (x of ['', '', '', '', '', '', '', '', '', '', '', '', '', '']; track x) {
            <mat-list-item>
              <span class="skeleton-item skeleton-full-width"></span>
            </mat-list-item>
          }
        </mat-list>
      }
    </mat-card-content>
  </mat-card>
