<mat-card>
  <mat-card-header> <mat-card-title> Seals </mat-card-title> </mat-card-header>

  <mat-card-content>
    <div class="player-seal__list">
      @for (seal of gildedSeals; track seal) {
        <lib-player-seal [playerSeal]="seal"></lib-player-seal>
      }
      @for (seal of completedSeals; track seal) {
        <lib-player-seal [playerSeal]="seal"></lib-player-seal>
      }
    </div>
    <mat-expansion-panel class="mat-elevation-z0">
      <mat-expansion-panel-header>
        <mat-panel-title> In Progress </mat-panel-title>
        <mat-panel-description>
          <div></div>
        </mat-panel-description>
      </mat-expansion-panel-header>
      <ng-template matExpansionPanelContent>
        <div class="player-seal__list">
          @for (seal of partialSeals; track seal) {
            <lib-player-seal [playerSeal]="seal"></lib-player-seal>
          }
        </div>
      </ng-template>
    </mat-expansion-panel>
  </mat-card-content>
</mat-card>
