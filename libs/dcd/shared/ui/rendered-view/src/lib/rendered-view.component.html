<span [outerHTML]="text"></span>
<ng-template libDynamicComp></ng-template>
@for (view of childrenViews; track view) {
  @if (view) {
    <lib-rendered-view [class]="view.classList || ''" [ngStyle]="view.styles || {}" [text]="view['text'] || ''"
      [component]="view['component']" [data]="view['data']" [childrenViews]="view['children'] || null">
    </lib-rendered-view>
  }
}
