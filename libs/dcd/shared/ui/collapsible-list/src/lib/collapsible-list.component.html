<mat-accordion>
  <mat-expansion-panel expanded>
    <mat-expansion-panel-header>
      <mat-panel-title>
        {{title}}
      </mat-panel-title>
    </mat-expansion-panel-header>
    <mat-list role="list">
      @for (item of items; track item; let idx = $index) {
        <mat-list-item role="listitem">
          <ng-container [ngTemplateOutlet]="itemTemplate" [ngTemplateOutletContext]="{ $implicit: item }">
          </ng-container>
        </mat-list-item>
      }
    </mat-list>

  </mat-expansion-panel>
</mat-accordion>
