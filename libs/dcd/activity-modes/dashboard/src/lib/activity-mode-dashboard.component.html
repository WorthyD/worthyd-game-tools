<div class="activity-dashboard">
  @for (activityModes of activities$; track activityModes) {
    <div>
      <h2>{{ activityModes.group.title }}</h2>
      <div class="activities-container">
        @for (mode of activityModes.activities; track mode) {
          <dcd-activity-mode-card-details
            [activityDefinition]="mode"
            class="activity"
            >
          </dcd-activity-mode-card-details>
        }
      </div>
    </div>
  }
</div>
