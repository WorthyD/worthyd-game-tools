<div class="activity-detail">
  <mat-toolbar>
    <button mat-icon-button aria-label="Back to Activities" routerLink="/activities">
      <mat-icon>arrow_back</mat-icon>
    </button>
    @if (vm$ | async; as vm) {
      <h2 class="">{{ vm?.activity?.displayProperties?.name }}</h2>
    }
    <button
      mat-button
      class="nav-button"
      routerLink="./"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
      >
      Overview
    </button>
    <button mat-button class="nav-button" routerLink="./table" routerLinkActive="active-link">Player Table</button>

  </mat-toolbar>
<router-outlet></router-outlet>
</div>
