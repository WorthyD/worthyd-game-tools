<div class="activity-breakdown-list">
  @if (activityInfo$ | async; as activityInfos) {
    @for (activityInfo of activityInfos; track activityInfo) {
      <div class="activity-breakdown-list__item">
        <dcd-activity-breakdown-item
          [title]="activityInfo.definition.displayProperties?.name || ''"
          [iconUrl]="activityInfo.definition.displayProperties?.icon"
          [description]="activityInfo.definition.displayProperties?.description"
          [label]="activityInfo.total.toString()"
        ></dcd-activity-breakdown-item>
      </div>
    }
  } @else {
    @for (character of ['', '', '', '', '', '']; track character) {
      <div class="activity-breakdown-list__item">
        <dcd-activity-breakdown-item [isLoading]="true"></dcd-activity-breakdown-item>
      </div>
    }
  }
</div>
