<div class="activity-dashboard">
  @for (activityGroups of curatedActivityGroups; track activityGroups) {
    <div>
      <h2>{{activityGroups.title}}</h2>
      <div class="activities-container">
        @for (activity of activityGroups.activities; track activity) {
          <dcd-activity-card-details [activityDefinition]="activity" class="activity"
            (viewActivity)="viewActivity($event)">
          </dcd-activity-card-details>
        }
      </div>
    </div>
  }
</div>
