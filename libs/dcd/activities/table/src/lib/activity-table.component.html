<div class="activity">
  @if (vm$ | async; as vm) {
    <lib-table-view
      class="activity-table"
      [isLoading]="isLoading"
      [dataSource]="(activityInfo$ | async)!"
      [viewer]="activityViewer"
      [filterer]="activityFilterer"
      [sorter]="activitySorter!"
      >

  </lib-table-view>
}

</div>
