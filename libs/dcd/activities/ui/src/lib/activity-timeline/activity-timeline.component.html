<mat-card>
  <mat-card-content>
    <div class="card-header">
      <div class="h2">In Game Time</div>
    </div>
    @if (!loading) {
      <div class="chart-container">
        @if (events?.length > 0;) {
          <lib-bar-chart [events]="events" convertTo="Hours"></lib-bar-chart>
        }
      </div>
    } @else {
      <div class="loading-container">
              <lib-skeleton-chart-loader></lib-skeleton-chart-loader>
    </div>
  }
</mat-card-content>
</mat-card>
